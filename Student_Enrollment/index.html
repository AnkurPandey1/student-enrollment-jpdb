<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Enrollment Form | JsonPowerDB</title>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 15px;
        }

        .card-wrapper {
            width: 100%;
            max-width: 640px;
        }

        /* Header badge */
        .db-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 6px 16px;
            color: #a0c4ff;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        .db-badge .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .page-title {
            color: #ffffff;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
        }
        .page-subtitle {
            color: #8899aa;
            font-size: 0.9rem;
            margin-bottom: 28px;
        }

        /* Card */
        .form-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(12px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.4);
        }

        /* Form fields */
        .form-group label {
            color: #ccd6e8;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 7px;
        }
        .form-group label .required {
            color: #f87171;
            margin-left: 3px;
        }

        .form-control {
            background: rgba(255,255,255,0.06) !important;
            border: 1.5px solid rgba(255,255,255,0.12) !important;
            border-radius: 10px !important;
            color: #ffffff !important;
            font-size: 0.92rem;
            padding: 10px 14px;
            transition: all 0.25s ease;
            height: auto;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25) !important; }
        .form-control:focus {
            background: rgba(255,255,255,0.1) !important;
            border-color: #60a5fa !important;
            box-shadow: 0 0 0 3px rgba(96,165,250,0.18) !important;
            outline: none;
        }
        .form-control:disabled {
            background: rgba(255,255,255,0.02) !important;
            border-color: rgba(255,255,255,0.06) !important;
            color: rgba(255,255,255,0.3) !important;
            cursor: not-allowed;
        }

        /* Primary key field highlight */
        #rollNo {
            border-color: rgba(96,165,250,0.4) !important;
        }
        #rollNo:focus {
            border-color: #60a5fa !important;
        }

        /* Divider */
        .form-divider {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 28px 0;
        }

        /* Buttons */
        .btn-group-custom {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn-custom {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 11px 10px;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-save {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            box-shadow: 0 4px 15px rgba(59,130,246,0.35);
        }
        .btn-save:hover:not(:disabled) {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.45);
        }
        .btn-update {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #fff;
            box-shadow: 0 4px 15px rgba(245,158,11,0.3);
        }
        .btn-update:hover:not(:disabled) {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            transform: translateY(-1px);
        }
        .btn-reset {
            background: rgba(255,255,255,0.08);
            color: #cbd5e1;
            border: 1.5px solid rgba(255,255,255,0.12);
        }
        .btn-reset:hover:not(:disabled) {
            background: rgba(255,255,255,0.14);
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-custom:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 24px;
            right: 24px;
            min-width: 260px;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.88rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        #toast.success {
            background: linear-gradient(135deg, #065f46, #064e3b);
            color: #6ee7b7;
            border: 1px solid rgba(110,231,183,0.25);
        }
        #toast.error {
            background: linear-gradient(135deg, #7f1d1d, #450a0a);
            color: #fca5a5;
            border: 1px solid rgba(252,165,165,0.25);
        }
        #toast.info {
            background: linear-gradient(135deg, #1e3a5f, #1e3a5f);
            color: #93c5fd;
            border: 1px solid rgba(147,197,253,0.25);
        }

        /* Status bar */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 24px;
            font-size: 0.82rem;
            color: #8899aa;
        }
        .status-bar .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #60a5fa;
            flex-shrink: 0;
        }
        .status-bar.status-new .status-dot { background: #4ade80; }
        .status-bar.status-edit .status-dot { background: #f59e0b; }

        /* Token input area */
        .token-section {
            margin-bottom: 20px;
        }
        .token-section label {
            color: #ccd6e8;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 7px;
            display: block;
        }
        .token-row {
            display: flex;
            gap: 10px;
        }
        .token-row .form-control {
            font-size: 0.78rem;
            font-family: monospace;
        }
        .btn-token {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .btn-token:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
    </style>
</head>
<body>

<!-- Toast Notification -->
<div id="toast"></div>

<div class="card-wrapper">
    <div class="db-badge">
        <span class="dot"></span>
        JsonPowerDB · SCHOOL-DB · STUDENT-TABLE
    </div>
    <h1 class="page-title">Student Enrollment</h1>
    <p class="page-subtitle">Enter Roll No to check existing record or create a new one.</p>

    <div class="form-card">

        <!-- Connection Token -->
        <div class="token-section">
            <label>Connection Token <span style="color:#f87171">*</span></label>
            <div class="token-row">
                <input type="text" id="token" class="form-control"
                    placeholder="Paste your JsonPowerDB connection token here"/>
                <button class="btn-token" onclick="saveToken()">Connect</button>
            </div>
        </div>

        <hr class="form-divider"/>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <span class="status-dot"></span>
            <span id="statusText">Enter a Roll No to get started.</span>
        </div>

        <!-- Form Fields -->
        <div class="form-group">
            <label>Roll No <span class="required">*</span> <small style="color:#60a5fa;font-weight:400;text-transform:none;">(Primary Key)</small></label>
            <input type="text" id="rollNo" class="form-control" placeholder="e.g. 101"
                onchange="checkRollNo()"/>
        </div>

        <div class="form-group mt-3">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" id="fullName" class="form-control" placeholder="Student's full name" disabled/>
        </div>

        <div class="row mt-3">
            <div class="col-sm-6">
                <div class="form-group">
                    <label>Class <span class="required">*</span></label>
                    <input type="text" id="class" class="form-control" placeholder="e.g. 10-A" disabled/>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label>Birth Date <span class="required">*</span></label>
                    <input type="date" id="birthDate" class="form-control" disabled/>
                </div>
            </div>
        </div>

        <div class="form-group mt-3">
            <label>Address <span class="required">*</span></label>
            <input type="text" id="address" class="form-control" placeholder="Full address" disabled/>
        </div>

        <div class="form-group mt-3">
            <label>Enrollment Date <span class="required">*</span></label>
            <input type="date" id="enrollmentDate" class="form-control" disabled/>
        </div>

        <hr class="form-divider"/>

        <!-- Buttons -->
        <div class="btn-group-custom">
            <button class="btn-custom btn-save" id="btnSave" disabled onclick="saveData()">
                💾 Save
            </button>
            <button class="btn-custom btn-update" id="btnUpdate" disabled onclick="updateData()">
                ✏️ Update
            </button>
            <button class="btn-custom btn-reset" id="btnReset" disabled onclick="resetForm()">
                ↺ Reset
            </button>
        </div>

    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="jpdb-commons.js"></script>

<script>
    // ─── Config ───────────────────────────────────────────────
    const DB_NAME    = "SCHOOL-DB";
    const REL_NAME   = "STUDENT-TABLE";
    const PK_FIELD   = "Roll-No";
    var   recNo      = "";   // stores record number for updates

    // ─── On Page Load ─────────────────────────────────────────
    $(document).ready(function () {
        // Restore token if saved
        var saved = localStorage.getItem("token");
        if (saved) $("#token").val(saved);
        resetForm();
    });

    // ─── Save Token ───────────────────────────────────────────
    function saveToken() {
        var t = $("#token").val().trim();
        if (!t) { showToast("Please paste your connection token.", "error"); return; }
        localStorage.setItem("token", t);
        showToast("Token saved! You can now use the form.", "success");
        $("#rollNo").focus();
    }

    // ─── Reset / Initial State ────────────────────────────────
    function resetForm() {
        recNo = "";
        // Clear all fields
        ["rollNo","fullName","class","birthDate","address","enrollmentDate"]
            .forEach(id => { document.getElementById(id).value = ""; });

        // Disable all fields except rollNo
        ["fullName","class","birthDate","address","enrollmentDate"]
            .forEach(id => { document.getElementById(id).disabled = true; });
        document.getElementById("rollNo").disabled = false;

        // Disable all buttons
        ["btnSave","btnUpdate","btnReset"].forEach(id => {
            document.getElementById(id).disabled = true;
        });

        setStatus("Enter a Roll No to get started.", "default");
        $("#rollNo").focus();
    }

    // ─── Check Roll No ────────────────────────────────────────
    function checkRollNo() {
        var rollNo = $("#rollNo").val().trim();
        if (!rollNo) { showToast("Roll No cannot be empty.", "error"); return; }
        if (!localStorage.getItem("token")) {
            showToast("Please connect with your token first.", "error"); return;
        }

        var req = createGET_BY_KEY(DB_NAME, REL_NAME, PK_FIELD, rollNo);
        var result = executeCommandAtGivenBaseUrl(req, jpdbBaseURL, jpdbIRL);

        if (result.status === 200) {
            // Record EXISTS → fill form, enable Update + Reset
            var data = JSON.parse(result.responseText).data.rec;
            recNo = JSON.parse(result.responseText).data.rec_no;

            $("#fullName").val(data["Full-Name"]);
            $("#class").val(data["Class"]);
            $("#birthDate").val(data["Birth-Date"]);
            $("#address").val(data["Address"]);
            $("#enrollmentDate").val(data["Enrollment-Date"]);

            enableFields(true);
            $("#rollNo").prop("disabled", true);   // lock primary key
            $("#btnSave").prop("disabled", true);
            $("#btnUpdate").prop("disabled", false);
            $("#btnReset").prop("disabled", false);

            setStatus("Record found. You can update the details.", "edit");
            showToast("Record loaded for Roll No: " + rollNo, "info");
            $("#fullName").focus();

        } else if (result.status === 400) {
            // Record NOT found → allow Save
            enableFields(false);
            $("#btnSave").prop("disabled", false);
            $("#btnUpdate").prop("disabled", true);
            $("#btnReset").prop("disabled", false);

            setStatus("New record. Fill in the details and click Save.", "new");
            showToast("New entry. Fill in the details.", "success");
            $("#fullName").focus();
        } else {
            showToast("Error connecting to JPDB. Check your token.", "error");
        }
    }

    // ─── Enable / Disable Fields ──────────────────────────────
    function enableFields(withValues) {
        ["fullName","class","birthDate","address","enrollmentDate"]
            .forEach(id => { document.getElementById(id).disabled = false; });
    }

    // ─── Validate ─────────────────────────────────────────────
    function validateForm() {
        var fields = {
            "Roll No":          $("#rollNo").val().trim(),
            "Full Name":        $("#fullName").val().trim(),
            "Class":            $("#class").val().trim(),
            "Birth Date":       $("#birthDate").val().trim(),
            "Address":          $("#address").val().trim(),
            "Enrollment Date":  $("#enrollmentDate").val().trim()
        };
        for (var key in fields) {
            if (!fields[key]) {
                showToast(key + " cannot be empty.", "error");
                return null;
            }
        }
        return {
            [PK_FIELD]:         fields["Roll No"],
            "Full-Name":        fields["Full Name"],
            "Class":            fields["Class"],
            "Birth-Date":       fields["Birth Date"],
            "Address":          fields["Address"],
            "Enrollment-Date":  fields["Enrollment Date"]
        };
    }

    // ─── Save ─────────────────────────────────────────────────
    function saveData() {
        var jsonObj = validateForm();
        if (!jsonObj) return;

        var req = createPUT(jsonObj, DB_NAME, REL_NAME);
        var result = executeCommandAtGivenBaseUrl(req, jpdbBaseURL, jpdbIML);

        if (result.status === 200) {
            showToast("✅ Record saved successfully!", "success");
            resetForm();
        } else {
            showToast("Failed to save. " + result.responseText, "error");
        }
    }

    // ─── Update ───────────────────────────────────────────────
    function updateData() {
        var jsonObj = validateForm();
        if (!jsonObj) return;
        delete jsonObj[PK_FIELD];   // don't update primary key

        var req = createUPDATE(jsonObj, DB_NAME, REL_NAME, recNo);
        var result = executeCommandAtGivenBaseUrl(req, jpdbBaseURL, jpdbIML);

        if (result.status === 200) {
            showToast("✅ Record updated successfully!", "success");
            resetForm();
        } else {
            showToast("Failed to update. " + result.responseText, "error");
        }
    }

    // ─── Status Bar ───────────────────────────────────────────
    function setStatus(msg, type) {
        $("#statusText").text(msg);
        var bar = $("#statusBar");
        bar.removeClass("status-new status-edit");
        if (type === "new")  bar.addClass("status-new");
        if (type === "edit") bar.addClass("status-edit");
    }

    // ─── Toast ────────────────────────────────────────────────
    function showToast(msg, type) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "show " + type;
        setTimeout(() => { t.className = ""; }, 3000);
    }
</script>
</body>
</html>
